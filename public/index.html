<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1e1e1e" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <title>cmux-web</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Mobile sidebar overlay backdrop -->
    <div id="sidebar-backdrop"></div>

    <aside id="sidebar">
      <div id="sidebar-header">
        <!-- Sidebar toggle icon (panel with left section filled) -->
        <button id="sidebar-toggle" class="sidebar-icon-btn" title="Toggle sidebar">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path d="M2 4a1 1 0 011-1h10a1 1 0 011 1v8a1 1 0 01-1 1H3a1 1 0 01-1-1V4zm4 0H3v8h3V4z"/>
          </svg>
        </button>
        <span class="logo">cmux-web</span>
        <span class="sidebar-header-spacer"></span>
        <!-- New workspace button -->
        <button id="add-workspace" class="sidebar-icon-btn" title="New workspace">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 3a.5.5 0 01.5.5V7.5H12a.5.5 0 010 1H8.5V12a.5.5 0 01-1 0V8.5H4a.5.5 0 010-1h3.5V3.5A.5.5 0 018 3z"/>
          </svg>
        </button>
        <button id="sidebar-close" class="mobile-only sidebar-icon-btn" title="Close sidebar">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path d="M4.646 4.646a.5.5 0 01.708 0L8 7.293l2.646-2.647a.5.5 0 01.708.708L8.707 8l2.647 2.646a.5.5 0 01-.708.708L8 8.707l-2.646 2.647a.5.5 0 01-.708-.708L7.293 8 4.646 5.354a.5.5 0 010-.708z"/>
          </svg>
        </button>
      </div>
      <div id="workspace-tabs"></div>
    </aside>

    <div id="main-wrapper">
      <!-- Floating sidebar toggle (visible when sidebar is collapsed) -->
      <button id="sidebar-restore" class="sidebar-icon-btn" title="Show sidebar">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 4a1 1 0 011-1h10a1 1 0 011 1v8a1 1 0 01-1 1H3a1 1 0 01-1-1V4zm4 0H3v8h3V4z"/>
        </svg>
      </button>
      <!-- Mobile toolbar -->
      <div id="mobile-toolbar">
        <button id="toolbar-sidebar" class="toolbar-btn" title="Workspaces">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <div id="toolbar-workspace-name" class="toolbar-title">—</div>
        <div id="toolbar-surface-switcher"></div>
        <button id="toolbar-actions" class="toolbar-btn" title="Actions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
      </div>

      <!-- Actions menu (mobile) -->
      <div id="actions-menu" class="hidden">
        <button class="action-item" data-action="new-pane">
          <span class="action-icon">+</span> New Pane
        </button>
        <button class="action-item" data-action="split-right">
          <span class="action-icon">⇥</span> Split Right
        </button>
        <button class="action-item" data-action="split-down">
          <span class="action-icon">⇤</span> Split Down
        </button>
        <hr class="action-divider" />
        <button class="action-item" data-action="new-workspace">
          <span class="action-icon">+</span> New Workspace
        </button>
        <button class="action-item action-danger" data-action="close-surface">
          <span class="action-icon">✕</span> Close Pane
        </button>
      </div>

      <main id="workspace-container"></main>
    </div>
  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
