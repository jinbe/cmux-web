<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1b26" />
  <title>cmux-web</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <!-- xterm.js + addons loaded as UMD globals -->
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Mobile sidebar overlay backdrop -->
    <div id="sidebar-backdrop"></div>

    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="logo">cmux-web</span>
        <button id="sidebar-close" class="mobile-only" title="Close sidebar">✕</button>
      </div>
      <div id="workspace-tabs"></div>
      <button id="add-workspace" title="New workspace">+ New Workspace</button>
    </aside>

    <div id="main-wrapper">
      <!-- Mobile toolbar -->
      <div id="mobile-toolbar">
        <button id="toolbar-sidebar" class="toolbar-btn" title="Workspaces">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <div id="toolbar-workspace-name" class="toolbar-title">—</div>
        <div id="toolbar-surface-switcher"></div>
        <button id="toolbar-actions" class="toolbar-btn" title="Actions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
      </div>

      <!-- Actions menu (mobile) -->
      <div id="actions-menu" class="hidden">
        <button class="action-item" data-action="new-pane">
          <span class="action-icon">+</span> New Pane
        </button>
        <button class="action-item" data-action="split-right">
          <span class="action-icon">⇥</span> Split Right
        </button>
        <button class="action-item" data-action="split-down">
          <span class="action-icon">⇤</span> Split Down
        </button>
        <hr class="action-divider" />
        <button class="action-item" data-action="new-workspace">
          <span class="action-icon">+</span> New Workspace
        </button>
        <button class="action-item action-danger" data-action="close-surface">
          <span class="action-icon">✕</span> Close Pane
        </button>
      </div>

      <main id="workspace-container"></main>
    </div>
  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
